services:
  oracle-xe:
    image: gvenzl/oracle-xe:21-slim
    platform: linux/amd64
    container_name: oracle-hospital
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: Oracle123
      APP_USER: hospital_admin
      APP_USER_PASSWORD: hospital123
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./scripts:/container-entrypoint-initdb.d
    shm_size: "1g"
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    restart: unless-stopped

volumes:
  oracle-data:
    driver: local